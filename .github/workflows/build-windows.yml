name: Build Windows Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Inject secrets from GitHub Actions
        shell: pwsh
        run: |
          (Get-Content app.py -Raw) `
            -replace '__GOOGLE_CLIENT_ID__', '${{ secrets.GOOGLE_CLIENT_ID }}' `
            -replace '__GOOGLE_CLIENT_SECRET__', '${{ secrets.GOOGLE_CLIENT_SECRET }}' `
            -replace '__PAYSTACK_SECRET_KEY__', '${{ secrets.PAYSTACK_SECRET_KEY }}' `
            -replace '__PAYSTACK_PUBLIC_KEY__', '${{ secrets.PAYSTACK_PUBLIC_KEY }}' `
            | Set-Content app.py -NoNewline

      - name: Build exe with PyInstaller
        run: pyinstaller desktop_app.spec

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntegrityMonitor-windows
          path: dist/IntegrityMonitor.exe

      - name: Publish to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automatically built from the latest push to main.
          files: dist/IntegrityMonitor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
